name: Release (Windows rebuild)

# Manually rebuild the Windows MSIs for an existing tag and attach them
# to the corresponding GitHub Release without creating a new tag/release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.5.7). Leave blank to use the latest tag."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pick tag (input or latest)
        id: pick
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="$(git describe --tags --abbrev=0)"
          fi
          echo "Resolved tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-msi:
    needs: resolve-tag
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
            wintun_arch: amd64
          - target: aarch64-pc-windows-msvc
            arch: arm64
            wintun_arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p yggdrasil --features ckr

      - name: Download wintun
        shell: pwsh
        run: |
          $wintunUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          $wintunSha256 = "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51"
          $zipPath = "$env:TEMP\wintun.zip"

          Invoke-WebRequest -Uri $wintunUrl -OutFile $zipPath

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          if ($hash -ne $wintunSha256) {
            Write-Error "Wintun SHA256 mismatch: expected $wintunSha256, got $hash"
            exit 1
          }

          Expand-Archive -Path $zipPath -DestinationPath "$env:TEMP\wintun"

          $dllSrc = "$env:TEMP\wintun\wintun\bin\${{ matrix.wintun_arch }}\wintun.dll"
          $binDir = "target\${{ matrix.target }}\release"
          Copy-Item $dllSrc -Destination $binDir

      - name: Install WiX toolset
        run: dotnet tool install --global wix

      - name: Accept WiX OSMF EULA
        run: wix.exe eula accept wix7

      - name: Get version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path crates\yggdrasil\Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        run: |
          $binDir = (Resolve-Path "target\${{ matrix.target }}\release").Path
          $srcDir = (Resolve-Path "contrib\msi").Path
          $outMsi = "yggdrasil-ng-${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}.msi"

          wix build contrib\msi\yggdrasil-ng.wxs `
            -d Version=${{ steps.version.outputs.VERSION }} `
            -d BinDir=$binDir `
            -d SrcDir=$srcDir `
            -arch ${{ matrix.arch }} `
            -o $outMsi

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdrasil-ng-msi-${{ matrix.arch }}
          path: "*.msi"

      - name: Attach to existing GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: "*.msi"